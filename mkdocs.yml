site_name: TUIC User Manual
docs_dir: docs
site_url: https://docs.ihsin.dev/tuic/
repo_url: https://github.com/Itsusinn/tuic
edit_uri: https://github.com/rust-proxy/tuic-docs/blob/master/docs/
repo_name: Itsusinn/tuic

theme:
  name: material
  features:
    - search.highlight
    - navigation.tracking
    # - navigation.instant
    # - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - content.action.edit
    # markdown_extensions Code blocks
    - content.code.copy
    - content.code.annotate

    # markdown_extensions.pymdownx.tabbed
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
# https://squidfunk.github.io/mkdocs-material/reference/
markdown_extensions:
  # Admonitions
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  # Code blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Content tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Foramtting
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  # Lists
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Welcome: index.md
  - Quick start:
    - quick-start/index.md
    - Server: quick-start/server.md
    - Client: quick-start/client.md
  - Configuration:
    - config/index.md
    - Server: config/server.md
    - Client: config/client.md

plugins:
  # - search
  # - awesome-pages
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - build: true
          default: true
          locale: en
          name: English
          site_name: "TUIC User Manual"
        - build: true
          default: false
          locale: zh
          name: 简体中文
          site_name: "TUIC 用户文档"
          nav_translations:
            Welcome: 欢迎
            Quick start: 快速开始
            Server: 服务端
            Client: 客户端
            Configuration: 配置

extra:
  analytics:
    provider: google
    property: G-8E3J72TZ88
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Itsusinn/tuic
    - icon: material/file-document
      link: https://github.com/rust-proxy/tuic-docs
